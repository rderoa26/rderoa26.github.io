<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rincón de la Curiosidad</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            font-size: 48px;
            margin-bottom: 30px;
            border-bottom: 3px solid #ff9966;
            padding-bottom: 20px;
        }
        .categoria-titulo {
            background: #ff9966;
            color: white;
            padding: 15px 25px;
            border-radius: 60px;
            font-size: 32px;
            display: inline-block;
            margin-bottom: 30px;
        }
        .tarjeta-curiosidad {
            background: #f9f9f9;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 25px;
            border-left: 10px solid #4CAF50;
        }
        .contenido-principal {
            font-size: 28px;
            color: #444;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .contenido-extra {
            font-size: 24px;
            color: #666;
            font-style: italic;
            padding-left: 20px;
            border-left: 5px solid #ff9966;
        }
        .botones {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 40px 0 20px;
            flex-wrap: wrap;
        }
        .boton {
            background: #4CAF50;
            color: white;
            padding: 25px 50px;
            border-radius: 80px;
            font-size: 32px;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            min-width: 250px;
            text-align: center;
            transition: transform 0.3s;
        }
        .boton:hover {
            transform: scale(1.05);
            background: #45a049;
        }
        .boton.secundario {
            background: #808080;
        }
        .boton.secundario:hover {
            background: #6b6b6b;
        }
        .mensaje-ayuda {
            text-align: center;
            font-size: 20px;
            color: #666;
            margin: 20px 0;
        }
        .volver-email {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #ccc;
        }
        .volver-email a {
            color: #ff9966;
            font-size: 24px;
            text-decoration: none;
            font-weight: bold;
        }
        .volver-email a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 RINCÓN DE LA CURIOSIDAD 🌟</h1>
        
        <div style="text-align: center;">
            <span class="categoria-titulo" id="categoria">Refrán popular</span>
        </div>
        
        <!-- Contenedor de curiosidades -->
        <div id="contenedor-curiosidades">
            <!-- Se llenará con JavaScript -->
        </div>
        
		<div class="botones">
			<a href="#" class="boton" id="btnOtra">🎲 OTRA CURIOSIDAD</a>
			<a href="https://mail.google.com/" class="boton secundario" id="btnVolver" target="_blank">📧 VOLVER AL EMAIL</a>
		</div>
        
        <div class="mensaje-ayuda">
            💡 Pulsa "OTRA CURIOSIDAD" para ver más del mismo tema
        </div>
        
        <div class="volver-email">
            <a href="#" id="btnAtras">← Volver a la página anterior</a>
        </div>
    </div>

    <script>
        // ===== BASE DE DATOS COMPLETA DE CURIOSIDADES =====
        const curiosidadesDB = {
            refran: [
                { 
                    contenido: "Año de nieves, año de bienes", 
                    extra: "Cuando nieva mucho, las cosechas serán buenas. La nieve protege los cultivos del frío intenso.",
                    icono: "📜"
                },
                { 
                    contenido: "Hasta el 40 de mayo no te quites el sayo", 
                    extra: "Hasta finales de mayo puede hacer frío. El refrán aconseja no guardar la ropa de abrigo hasta bien entrado mayo.",
                    icono: "🌡️"
                },
                { 
                    contenido: "En abril, aguas mil", 
                    extra: "Abril es tradicionalmente un mes muy lluvioso en España. Prepara el paraguas.",
                    icono: "☔"
                },
                { 
                    contenido: "A quien madruga, Dios le ayuda", 
                    extra: "Los que empiezan el día pronto tienen más oportunidades y aprovechan mejor el tiempo.",
                    icono: "🌅"
                },
                { 
                    contenido: "No por mucho madrugar amanece más temprano", 
                    extra: "Las prisas no aceleran las cosas. Hay procesos que llevan su tiempo.",
                    icono: "⏰"
                },
                { 
                    contenido: "Más vale pájaro en mano que ciento volando", 
                    extra: "Es mejor conformarse con lo seguro que arriesgarse por algo mejor pero incierto.",
                    icono: "🐦"
                },
                { 
                    contenido: "Cuando el río suena, agua lleva", 
                    extra: "Los rumores suelen tener algo de verdad. Si se habla de algo, por algo será.",
                    icono: "🌊"
                },
                { 
                    contenido: "Al mal tiempo, buena cara", 
                    extra: "Cuando las cosas van mal, lo mejor es mantener el ánimo y la actitud positiva.",
                    icono: "😊"
                }
            ],
            efemeride: [
                { 
                    contenido: "Tal día como hoy, pero de 1937: Radio Nacional de España emitió por primera vez.", 
                    extra: "Fue el 19 de enero de 1937. La primera emisión se realizó desde Salamanca.",
                    icono: "📻"
                },
                { 
                    contenido: "Tal día como hoy, pero de 1953: Se estrenó 'Bienvenido Mister Marshall'.", 
                    extra: "Una de las películas más queridas del cine español, dirigida por Luis García Berlanga.",
                    icono: "🎬"
                },
                { 
                    contenido: "Tal día como hoy, pero de 1966: Raphael actuó por primera vez en Eurovisión.", 
                    extra: "Con la canción 'Yo soy aquél', Raphael representó a España en el festival.",
                    icono: "🎵"
                }
            ],
            receta: [
                { 
                    contenido: "Tortilla de patatas", 
                    extra: "Receta tradicional: Patatas, huevos, cebolla (opcional), aceite y sal. Se fríen las patatas, se mezclan con huevo batido y se cuaja en la sartén.",
                    icono: "🍳"
                },
                { 
                    contenido: "Paella valenciana", 
                    extra: "Arroz con pollo, conejo, judía verde, garrofón, tomate, aceite y azafrán. Un plato que representa a España en el mundo.",
                    icono: "🥘"
                },
                { 
                    contenido: "Gazpacho andaluz", 
                    extra: "Sopa fría de tomate, pepino, pimiento, ajo, pan, aceite de oliva y vinagre. Perfecto para el verano.",
                    icono: "🥣"
                }
            ],
            numero: [
                { 
                    contenido: "El 7 es el número de la buena suerte", 
                    extra: "En muchas culturas, el 7 se considera mágico: 7 días de la semana, 7 maravillas del mundo, 7 colores del arcoíris.",
                    icono: "7️⃣"
                },
                { 
                    contenido: "El 13 es considerado de mala suerte", 
                    extra: "Muchos edificios no tienen piso 13, y el viernes 13 se considera un día de mala suerte en muchas culturas.",
                    icono: "13️⃣"
                },
                { 
                    contenido: "El 108 es un número sagrado", 
                    extra: "En el hinduismo y budismo, el 108 es sagrado. Hay 108 cuentas en los rosarios y 108 nombres de deidades.",
                    icono: "🔢"
                }
            ],
            cita: [
                { 
                    contenido: "No hay camino para la paz, la paz es el camino", 
                    extra: "— Mahatma Gandhi. Una reflexión sobre cómo vivir en paz.",
                    icono: "💭"
                },
                { 
                    contenido: "La vida es muy peligrosa. No por las personas que hacen el mal, sino por las que se sientan a ver lo que pasa", 
                    extra: "— Albert Einstein. Sobre la importancia de no ser indiferentes.",
                    icono: "🌟"
                },
                { 
                    contenido: "El secreto de la felicidad no es hacer siempre lo que se quiere, sino querer siempre lo que se hace", 
                    extra: "— León Tolstói. Una lección sobre la actitud ante la vida.",
                    icono: "💫"
                }
            ],
            general: [
                { 
                    contenido: "Radio Nacional de España emitió por primera vez el 19 enero 1937.", 
                    extra: "La primera emisión fue desde Salamanca, en plena Guerra Civil.",
                    icono: "📻"
                },
                { 
                    contenido: "El refranero español tiene más de 100.000 refranes documentados.", 
                    extra: "Es uno de los más ricos del mundo, fruto de siglos de sabiduría popular.",
                    icono: "📚"
                },
                { 
                    contenido: "La siesta española tiene origen en la Guerra Civil.", 
                    extra: "Los trabajadores descansaban en las horas de más calor para evitar el cansancio extremo.",
                    icono: "😴"
                }
            ]
        };

        // ===== FUNCIONES =====
        function getTipoFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('tipo') || 'refran';
        }

        function getRandomInt(max) {
            return Math.floor(Math.random() * max);
        }

        function mostrarCuriosidades(tipo) {
            const lista = curiosidadesDB[tipo] || curiosidadesDB.general;
            const indices = [];
            
            // Seleccionar 3 índices aleatorios diferentes
            while (indices.length < 3 && indices.length < lista.length) {
                const randomIndex = getRandomInt(lista.length);
                if (!indices.includes(randomIndex)) {
                    indices.push(randomIndex);
                }
            }
            
            // Construir HTML
            let html = '';
            indices.forEach(index => {
                const item = lista[index];
                html += `
                    <div class="tarjeta-curiosidad">
                        <div style="font-size: 48px; margin-bottom: 10px;">${item.icono}</div>
                        <div class="contenido-principal">${item.contenido}</div>
                        <div class="contenido-extra">${item.extra}</div>
                    </div>
                `;
            });
            
            document.getElementById('contenedor-curiosidades').innerHTML = html;
            
            // Actualizar título de categoría
            const nombresCat = {
                'refran': '📜 Refranes populares',
                'efemeride': '🎬 Efemérides',
                'receta': '🍳 Recetas tradicionales',
                'numero': '🔢 Curiosidades numéricas',
                'cita': '💭 Citas inspiradoras',
                'general': '🌟 Curiosidades generales'
            };
            document.getElementById('categoria').textContent = nombresCat[tipo] || 'Curiosidades';
        }

        // ===== CONFIGURAR BOTONES =====
        function configurarBotones(tipo) {
            // Botón "Otra curiosidad"
            document.getElementById('btnOtra').addEventListener('click', function(e) {
                e.preventDefault();
                mostrarCuriosidades(tipo);
            });
            
            // Botón "Volver al email" - Ahora abre Gmail directamente
			// El enlace ya está en el HTML, no necesitamos JavaScript para esto
			// document.getElementById('btnVolver').addEventListener('click', function(e) {
			//     e.preventDefault();
			//     alert('Para volver a tu email, abre tu programa de correo (Gmail, Outlook, etc.)');
			// });
            
            // Botón "Atrás"
            document.getElementById('btnAtras').addEventListener('click', function(e) {
                e.preventDefault();
                history.back();
            });
        }

        // ===== INICIALIZAR =====
        window.onload = function() {
            const tipo = getTipoFromURL();
            mostrarCuriosidades(tipo);
            configurarBotones(tipo);
        };
    </script>
</body>
</html>
