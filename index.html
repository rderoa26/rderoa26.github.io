<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rincón de la Curiosidad</title>
    <style>
        /* (Mantén aquí todo tu CSS actual) */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            font-size: 48px;
            margin-bottom: 30px;
            border-bottom: 3px solid #ff9966;
            padding-bottom: 20px;
        }
        .categoria-titulo {
            background: #ff9966;
            color: white;
            padding: 15px 25px;
            border-radius: 60px;
            font-size: 32px;
            display: inline-block;
            margin-bottom: 30px;
        }
        .tarjeta-curiosidad {
            background: #f9f9f9;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 25px;
            border-left: 10px solid #4CAF50;
        }
        .contenido-principal {
            font-size: 28px;
            color: #444;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .contenido-extra {
            font-size: 24px;
            color: #666;
            font-style: italic;
            padding-left: 20px;
            border-left: 5px solid #ff9966;
        }
        .botones {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 40px 0 20px;
            flex-wrap: wrap;
        }
        .boton {
            background: #4CAF50;
            color: white;
            padding: 25px 50px;
            border-radius: 80px;
            font-size: 32px;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            min-width: 250px;
            text-align: center;
            transition: transform 0.3s;
        }
        .boton:hover {
            transform: scale(1.05);
            background: #45a049;
        }
        .boton.secundario {
            background: #808080;
        }
        .boton.secundario:hover {
            background: #6b6b6b;
        }
        .mensaje-ayuda {
            text-align: center;
            font-size: 20px;
            color: #666;
            margin: 20px 0;
        }
        .volver-email {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #ccc;
        }
        .volver-email a {
            color: #ff9966;
            font-size: 24px;
            text-decoration: none;
            font-weight: bold;
        }
        .volver-email a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌟 RINCÓN DE LA CURIOSIDAD 🌟</h1>
        
        <div style="text-align: center;">
            <span class="categoria-titulo" id="categoria">Refrán popular</span>
        </div>
        
        <!-- Contenedor de curiosidades -->
        <div id="contenedor-curiosidades">
            <!-- Se llenará con JavaScript -->
        </div>
        
        <div class="botones">
            <a href="#" class="boton" id="btnOtra">🎲 OTRA CURIOSIDAD</a>
            <a href="#" class="boton secundario" id="btnVolver" onclick="volverAGmail(); return false;">📧 VOLVER AL EMAIL</a>
        </div>
        
        <div class="mensaje-ayuda">
            💡 Pulsa "OTRA CURIOSIDAD" para ver más del mismo tema
        </div>
        
        <div class="volver-email">
            <a href="#" id="btnAtras">← Volver a la página anterior</a>
        </div>
    </div>

	<script>
		// ===== BASE DE DATOS DE CURIOSIDADES =====
		const curiosidadesDB = {
			refran: [
				{ contenido: "Año de nieves, año de bienes", extra: "Cuando nieva mucho, las cosechas serán buenas.", icono: "📜" },
				{ contenido: "Hasta el 40 de mayo no te quites el sayo", extra: "Hasta finales de mayo puede hacer frío.", icono: "🌡️" },
				{ contenido: "En abril, aguas mil", extra: "Abril es tradicionalmente un mes muy lluvioso.", icono: "☔" }
			],
			efemeride: [
				{ contenido: "Tal día como hoy, pero de 1937: Radio Nacional de España emitió por primera vez.", extra: "Fue el 19 de enero desde Salamanca.", icono: "📻" },
				{ contenido: "Tal día como hoy, pero de 1953: Se estrenó 'Bienvenido Mister Marshall'.", extra: "Una de las películas más queridas del cine español.", icono: "🎬" }
			],
			receta: [
				{ contenido: "Tortilla de patatas", extra: "Patatas, huevos, cebolla, aceite y sal.", icono: "🍳" },
				{ contenido: "Paella valenciana", extra: "Arroz, pollo, conejo, judía verde, garrofón.", icono: "🥘" }
			],
			numero: [
				{ contenido: "El 7 es el número de la buena suerte", extra: "7 días, 7 maravillas, 7 colores.", icono: "7️⃣" },
				{ contenido: "El 13 es considerado de mala suerte", extra: "Por eso muchos edificios no tienen piso 13.", icono: "13️⃣" }
			],
			cita: [
				{ contenido: "No hay camino para la paz, la paz es el camino", extra: "— Mahatma Gandhi", icono: "💭" }
			]
		};

		function getTipoFromURL() {
			const params = new URLSearchParams(window.location.search);
			return params.get('tipo') || 'refran';
		}

		function getRandomInt(max) {
			return Math.floor(Math.random() * max);
		}

		function mostrarCuriosidades(tipo) {
			if (!curiosidadesDB[tipo]) tipo = 'refran';
			const lista = curiosidadesDB[tipo];
			
			const indices = [];
			while (indices.length < 3 && indices.length < lista.length) {
				const randomIndex = getRandomInt(lista.length);
				if (!indices.includes(randomIndex)) indices.push(randomIndex);
			}
			
			let html = '';
			indices.forEach(index => {
				const item = lista[index];
				html += `
					<div class="tarjeta-curiosidad">
						<div style="font-size: 48px;">${item.icono}</div>
						<div class="contenido-principal">${item.contenido}</div>
						<div class="contenido-extra">${item.extra}</div>
					</div>
				`;
			});
			
			document.getElementById('contenedor-curiosidades').innerHTML = html;
			
			const nombresCat = {
				'refran': '📜 Refranes populares',
				'efemeride': '🎬 Efemérides',
				'receta': '🍳 Recetas tradicionales',
				'numero': '🔢 Curiosidades numéricas',
				'cita': '💭 Citas inspiradoras'
			};
			document.getElementById('categoria').textContent = nombresCat[tipo] || 'Curiosidades';
		}

		function configurarBotones(tipo) {
			document.getElementById('btnOtra').addEventListener('click', function(e) {
				e.preventDefault();
				mostrarCuriosidades(tipo);
			});
			
			document.getElementById('btnAtras').addEventListener('click', function(e) {
				e.preventDefault();
				history.back();
			});
		}

		// ===== FUNCIÓN PARA VOLVER A GMAIL (VERSIÓN QUE FUNCIONA) =====
		function volverAGmail() {
			// Intentar cerrar la ventana
			window.close();
			
			// Por si acaso no se cierra, redirigir a Gmail después de 1 segundo
			setTimeout(function() {
				window.location.href = 'https://mail.google.com/';
			}, 1000);
		}

		// ===== INICIALIZAR =====
		window.onload = function() {
			const tipo = getTipoFromURL();
			mostrarCuriosidades(tipo);
			configurarBotones(tipo);
		};
	</script>
</body>
</html>
